<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gesture Video Control</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; width: 100vw; height: 100vh; overflow: hidden; }

  #video-container {
    position: fixed;
    inset: 0;
  }

  #mainVideo {
    width: 90%;
    height: auto;
    display: block;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  @media (max-width: 768px) {
    #mainVideo {
      width: 95%;
    }
    #pip-container {
      width: 200px;
      height: 150px;
    }
  }

  #pip-container {
    position: fixed;
    right: 16px;
    bottom: 16px;
    width: 240px;
    height: 180px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 8px;
    overflow: hidden;
    background: #111;
    z-index: 10;
  }

  #webcam {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  #landmarkCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: scaleX(-1);
    pointer-events: none;
  }

  #hud {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 20;
    pointer-events: none;
  }

  #status-label {
    color: rgba(255,255,255,0.8);
    font-family: monospace;
    font-size: 13px;
    background: rgba(0,0,0,0.5);
    padding: 4px 12px;
    border-radius: 12px;
  }

  #progress-bar-container {
    width: 260px;
    height: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    background: #fff;
    border-radius: 3px;
    transition: width 0.05s linear;
  }

  #openness-bar-container {
    width: 260px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }

  #openness-bar {
    height: 100%;
    width: 0%;
    background: #4af;
    border-radius: 2px;
  }
</style>
</head>
<body>

<div id="video-container">
  <video id="mainVideo" src="video_mobile.mp4" preload="auto" autoplay muted playsinline webkit-playsinline></video>
</div>

<div id="pip-container">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="landmarkCanvas"></canvas>
</div>

<div id="hud">
  <div id="status-label">웹캠 초기화 중...</div>
  <div id="progress-bar-container">
    <div id="progress-bar"></div>
  </div>
  <div id="openness-bar-container">
    <div id="openness-bar"></div>
  </div>
</div>

<!-- MediaPipe Hands CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
  const mainVideo   = document.getElementById('mainVideo');
  const webcamEl    = document.getElementById('webcam');
  const lmCanvas    = document.getElementById('landmarkCanvas');
  const lmCtx       = lmCanvas.getContext('2d');
  const statusEl    = document.getElementById('status-label');
  const progressBar = document.getElementById('progress-bar');
  const opennessBar = document.getElementById('openness-bar');

  // PIP canvas resize
  const pipContainer = document.getElementById('pip-container');
  function resizeLmCanvas() {
    lmCanvas.width  = pipContainer.clientWidth;
    lmCanvas.height = pipContainer.clientHeight;
  }
  resizeLmCanvas();
  window.addEventListener('resize', resizeLmCanvas);

  // autoplay → 즉시 pause (iOS 디코더 활성화용)
  mainVideo.addEventListener('playing', () => {
    mainVideo.pause();
    mainVideo.currentTime = 0;
  }, { once: true });

  // 실측 기반
  const MIN_RATIO = 0.05;
  const MAX_RATIO = 0.95;

  // State
  let targetSeek = 0;
  let smoothSeek = 0.0;
  let hasHand    = false;

  // ------- hand openness -------
  function dist2d(a, b) {
    return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
  }

  function calcOpenness(landmarks) {
    const wrist     = landmarks[0];
    const middleMcp = landmarks[9];
    const palmSize  = dist2d(wrist, middleMcp);
    if (palmSize < 1e-6) return 0;

    const pairs = [[5, 8], [9, 12], [13, 16], [17, 20]];
    const avgDist = pairs.reduce((s, [m, t]) => s + dist2d(landmarks[t], landmarks[m]), 0) / pairs.length;
    const ratio = avgDist / palmSize;
    return Math.min(1, Math.max(0, (ratio - MIN_RATIO) / (MAX_RATIO - MIN_RATIO)));
  }

  // ------- MediaPipe Hands -------
  const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5,
  });

  hands.onResults((results) => {
    lmCtx.clearRect(0, 0, lmCanvas.width, lmCanvas.height);
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
      hasHand = true;
      const lm = results.multiHandLandmarks[0];
      drawConnectors(lmCtx, lm, HAND_CONNECTIONS, { color: 'rgba(0,255,180,0.8)', lineWidth: 1.5 });
      drawLandmarks(lmCtx, lm, { color: '#fff', fillColor: 'rgba(0,200,255,0.7)', lineWidth: 1, radius: 3 });
      targetSeek = calcOpenness(lm);
      statusEl.textContent = `Fortune Opening: ${(targetSeek * 100).toFixed(0)}%`;
    } else {
      hasHand = false;
      statusEl.textContent = '손을 카메라에 보여주세요';
    }
  });

  // ------- Camera -------
  const camera = new Camera(webcamEl, {
    onFrame: async () => { await hands.send({ image: webcamEl }); },
    width: 400,
    height: 300,
  });

  camera.start().then(() => {
    statusEl.textContent = '손을 카메라에 보여주세요';
  }).catch((err) => {
    statusEl.textContent = '웹캠 접근 실패: ' + err.message;
  });

  // ------- rAF loop -------
  function lerp(a, b, t) { return a + (b - a) * t; }

  let videoReady = false;
  mainVideo.addEventListener('loadedmetadata', () => { videoReady = true; });
  mainVideo.addEventListener('canplaythrough', () => { videoReady = true; });

  let isSeeking = false;
  mainVideo.addEventListener('seeking', () => { isSeeking = true; });
  mainVideo.addEventListener('seeked',  () => { isSeeking = false; });

  function tick() {
    const dur = mainVideo.duration;
    if (videoReady && dur && !isNaN(dur)) {
      if (hasHand) {
        smoothSeek = lerp(smoothSeek, targetSeek, 0.12);
        if (!isSeeking) {
          mainVideo.currentTime = Math.min(smoothSeek * dur, dur - 0.001);
        }
      }
      progressBar.style.width = (mainVideo.currentTime / dur * 100) + '%';
    }
    opennessBar.style.width = (smoothSeek * 100) + '%';
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
</script>
</body>
</html>
